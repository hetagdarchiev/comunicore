# forum server can be configured from
# - command line (highest priority),
# - environment variables,
# - this config
# config params have similar names, params with default values can be omitted

[server]
# default "::1", cmd --server-host, env FORUM_SERVER_HOST
host = "::1"
# default 8080, cmd --server-port, env FORUM_SERVER_PORT
port = 8080
# default "http://localhost:8080", cmd --server-baseurl, env FORUM_SERVER_BASEURL
baseurl = "http://localhost:8080"
# default "" (CORS disabled), cmd --server-permitted-origin, env FORUM_SERVER_PERMITTED_ORIGIN
# permitted_origin = ""
# no default, must by nonempty, cmd --server-jwt-secret, env FORUM_SERVER_JWT_SECRET
jwt_secret = ""
# default is cwd of process (installed by systemd or if running from cmdline),
# if filled and not absolute, it is relative to current cwd (strange case, but who knows)
# cmd --server-work-dir, env FORUM_SERVER_WORK_DIR
# work_dir = ""
# default is "work_dir/upload",
# not absolute path will relative to work_dir,
# cmd --server-upload-dir, env FORUM_SERVER_UPLOAD_DIR
# upload_dir = ""

[database]
# default "localhost", cmd --database-host, env FORUM_DATABASE_HOST
host = "localhost"
# default 5432, cmd --database-port, env FORUM_DATABASE_PORT
port = 5432
# no default, must by nonempty, cmd --database-name, env FORUM_DATABASE_NAME
name = "comunicore"
# no default, must be nonempty, cmd --database-user, env FORUM_DATABASE_USER
user = "comunicore"
# no default, must by nonempty, cmd --database-password, env FORUM_DATABASE_PASSWORD
password = ""
